  <line x1="8" y1="8"  x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="20" y1="28" x2="26" y2="14" stroke="#00c2b5" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Nodes -->
